<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar · VortexHost</title>
    
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    
</head>
<body>

    <div th:replace="~{fragments/header :: cabecalho}"></div>

    <main>
        <section class="auth-page">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="brand"><div class="brand-icon">V</div><span>VortexHost</span></div>
                </div>
                <h1 class="auth-title">Bem-vindo de volta.</h1>
                <p class="auth-sub">Acesse sua área do cliente para gerenciar seus serviços.</p>

                <form action="/login" novalidate id="loginForm">
                    <input type="hidden" name="_csrf" value="token-de-exemplo">

                    <div class="form-group">
                        <label class="form-label" for="email">E-mail</label>
                        <input class="form-input" type="email" id="email" name="email"
                               required value="" autocomplete="email" placeholder="seu@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Senha</label>
                        <input class="form-input" type="password" id="password" name="password"
                               required autocomplete="current-password" placeholder="••••••••">
                    </div>

                    <button class="btn btn-primary btn-full" style="margin-top:.5rem" type="submit">ENTRAR</button>
                </form>

                <p class="auth-foot">Ainda não tem conta? <a href="/cadastro">Criar conta grátis</a></p>

                <div id="success" class="success"></div>
                <div id="error-geral" class="error"></div>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: rodape}"></div>
    
    <script th:src="@{/js/login.js}"></script>

</body>
</html>
